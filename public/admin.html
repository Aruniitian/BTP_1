<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — AmoebaDB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin-style.css">
</head>
<body>
    <!-- ========== LOGIN SCREEN ========== -->
    <div id="loginModal" class="login-screen">
        <div class="login-bg">
            <div class="login-blob login-blob-1"></div>
            <div class="login-blob login-blob-2"></div>
            <div class="login-blob login-blob-3"></div>
        </div>
        <div class="login-card">
            <div class="login-logo">
                <div class="login-logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="28" height="28">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                </div>
                <h1>AmoebaDB</h1>
                <span class="login-badge">Admin Panel</span>
            </div>
            <p class="login-subtitle">Sign in to manage genomic datasets</p>
            <form id="adminLoginForm" autocomplete="off">
                <div class="login-field">
                    <label for="username">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        Username
                    </label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="off">
                </div>
                <div class="login-field">
                    <label for="password">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                        Password
                    </label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="off">
                        <button type="button" class="toggle-pw" onclick="togglePassword()">
                            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <div id="loginError" class="login-error" style="display:none;"></div>
                <button type="submit" class="login-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                    Sign In
                </button>
            </form>
            <div class="login-footer">
                <a href="/">← Back to main site</a>
            </div>
        </div>
    </div>

    <!-- ========== ADMIN DASHBOARD ========== -->
    <div id="adminDashboard" class="dashboard" style="display:none;">
        <!-- Top Navigation -->
        <header class="dash-header" id="adminPanel" style="display:none;">
            <div class="dash-header-left">
                <div class="dash-logo">
                    <div class="dash-logo-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        </svg>
                    </div>
                    <div>
                        <h1>AmoebaDB</h1>
                        <span>Admin Dashboard</span>
                    </div>
                </div>
            </div>
            <div class="dash-header-right">
                <div class="dash-search">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="adminSearchInput" placeholder="Search by ID or keyword…">
                    <button id="adminSearchBtn" class="dash-search-btn" title="Search">Go</button>
                    <button id="adminClearSearchBtn" class="dash-search-clear" style="display:none;" title="Clear search">✕</button>
                </div>
                <div class="dash-header-actions">
                    <a href="/" class="dash-btn dash-btn-ghost" title="Back to main site">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                        Site
                    </a>
                    <button id="logoutBtn" class="dash-btn dash-btn-danger" title="Sign out">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                        Logout
                    </button>
                </div>
            </div>
        </header>

        <div class="dash-body">
            <!-- Sidebar -->
            <aside class="dash-sidebar" id="dashSidebar">
                <button class="sidebar-toggle" id="sidebarToggle" title="Collapse sidebar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><polyline points="15 18 9 12 15 6"/></svg>
                </button>

                <div class="sidebar-section">
                    <div class="sidebar-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
                        <span class="sidebar-label">Data Management</span>
                    </div>
                </div>

                <!-- Download Manager Nav -->
                <div class="sidebar-section">
                    <button class="sidebar-btn sidebar-btn-special" id="downloadManagerBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        <span class="sidebar-label">Download Manager</span>
                        <span class="sidebar-badge" id="dlBadge" style="display:none;">0</span>
                    </button>
                </div>

                <!-- All Organisms Section (includes all 43 organisms) -->
                <div class="sidebar-section" style="margin-top:.5rem">
                    <div style="height:1px;background:rgba(255,255,255,.07);margin:.5rem .75rem"></div>
                    <div class="sidebar-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>
                        <span class="sidebar-label">Browse Organisms</span>
                    </div>
                    <div class="sidebar-organism sidebar-collapsible-toggle collapsed" data-target="all-organisms-items">
                        <div class="sidebar-organism-badge" style="background:linear-gradient(135deg,#475569,#334155);font-size:.6rem">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
                        </div>
                        <span class="sidebar-label" id="allOrgsCount">Loading…</span>
                        <svg class="sidebar-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                    <div class="sidebar-collapsible" id="all-organisms-items">
                        <div id="allOrganismsList" style="max-height:320px;overflow-y:auto;padding-right:2px">
                            <div class="sidebar-btn" style="opacity:.5;font-size:.75rem;cursor:default">Loading organisms…</div>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="dash-main">
                <div id="adminContent">
                    <!-- Welcome content injected by JS -->
                </div>
            </main>
        </div>
    </div>

    <script>
        function togglePassword() {
            const pw = document.getElementById('password');
            pw.type = pw.type === 'password' ? 'text' : 'password';
        }
    </script>
    <script src="/admin-script.js"></script>
</body>
</html>
