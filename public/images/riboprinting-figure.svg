<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <style>
    .title { font: bold 24px serif; fill: #000; }
    .label { font: 14px serif; fill:#000 }
    .box { fill:#fff; stroke:#000; stroke-width:1 }
    .arrow { stroke:#000; stroke-width:2; fill:none; }
  </style>
  <text x="380" y="28" class="title">RIBOPRINTING</text>

  <!-- Cells -->
  <g>
    <circle cx="80" cy="80" r="28" fill="#fff" stroke="#000"/>
    <circle cx="120" cy="80" r="28" fill="#fff" stroke="#000"/>
    <circle cx="100" cy="110" r="28" fill="#fff" stroke="#000"/>
    <text x="60" y="160" class="label">Cells</text>
  </g>

  <!-- arrow to DNA Extraction -->
  <path d="M160 90 L260 90" class="arrow" marker-end="url(#arrow)" />
  <text x="210" y="80" class="label">Lysis</text>
  <rect x="270" y="60" width="120" height="60" class="box"/>
  <text x="300" y="95" class="label">DNA Extraction</text>

  <!-- arrow to DNA bundle -->
  <path d="M400 90 L520 90" class="arrow" marker-end="url(#arrow)" />
  <g>
    <rect x="540" y="40" width="120" height="80" rx="6" ry="6" class="box"/>
    <text x="560" y="85" class="label">DNA</text>
  </g>

  <!-- Small subunit and PCR flow bottom -->
  <g>
    <text x="80" y="220" class="label">Small Subunit rRNA Gene</text>
    <path d="M200 220 L320 220" class="arrow" marker-end="url(#arrow)" />
    <text x="330" y="210" class="label">Heat / Denaturation</text>

    <rect x="360" y="190" width="140" height="60" class="box"/>
    <text x="380" y="225" class="label">Oligonucleotide Primers</text>

    <path d="M500 220 L620 220" class="arrow" marker-end="url(#arrow)" />
    <rect x="630" y="190" width="140" height="60" class="box"/>
    <text x="650" y="225" class="label">Polymerase Chain Reaction</text>

    <path d="M770 220 L840 220" class="arrow" marker-end="url(#arrow)" />
    <rect x="850" y="170" width="120" height="90" class="box"/>
    <text x="860" y="205" class="label">Restriction Enzyme<br/>Digestion</text>

    <rect x="30" y="240" width="200" height="40" class="box"/>
    <text x="50" y="265" class="label">Gel Electrophoresis</text>
  </g>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#000" />
    </marker>
  </defs>
</svg>
